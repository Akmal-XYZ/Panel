<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PROJECT PANEL PRO</title>

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #111, #050505);
  color:white;
}

.container { padding:15px; }

/* PROJECT CARD */
.project {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  transition:0.3s;
}

.project:hover { transform:scale(1.02); }

.status span {
  margin-left:6px;
  font-size:12px;
  padding:4px 6px;
  border-radius:6px;
  background:#111;
}

/* OVERLAY */
.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}
.overlay.active { display:flex; }

.overlay-header {
  padding:15px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  padding:10px;
  overflow:auto;
}

img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

/* INPUT */
textarea {
  width:100%;
  height:80px;
  border:none;
  border-radius:10px;
  padding:10px;
  background:#111;
  color:white;
}

audio { width:100%; margin-top:10px; }

button {
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="projects">Loading...</div>

<div class="overlay" id="overlay">
  <div class="overlay-header">
    <span id="title"></span>
    <button onclick="closeOverlay()">Close</button>
  </div>

  <!-- NOTE -->
  <div style="padding:10px">
    <textarea id="noteInput" placeholder="Tulis note..."></textarea>
    <button onclick="uploadNote()">Upload Note</button>
  </div>

  <!-- AUDIO -->
  <div style="padding:10px">
    <input type="file" id="audioInput" accept="audio/*">
    <audio id="audioPlayer" controls></audio>
    <button onclick="uploadAudio()">Upload Audio</button>
  </div>

  <!-- GALLERY -->
  <div class="gallery" id="gallery"></div>
</div>

<script>
const CLOUD_NAME = "dzbpzdqao";
const PRESET = "akmal_pending_9x7";

let dataGlobal = [];
let currentUser = "";

/* RANDOM TIME FORMAT */
function getRandomTime() {
  const h = Math.floor(Math.random()*24);
  const m = Math.floor(Math.random()*60);
  return `${String(h).padStart(2,'0')}-${String(m).padStart(2,'0')}`;
}

/* EXTRACT USER */
function extractUser(name){
  const match = name.match(/BY_(@[A-Z0-9_]+)/);
  return match ? match[1] : null;
}

/* LOAD DATA */
async function load(){
  try{
    const res = await fetch("/api/backend");
    const json = await res.json();

    dataGlobal = json.resources || [];

    const grouped = {};

    dataGlobal.forEach(f=>{
      const user = extractUser(f.public_id);
      if(!user) return;

      if(!grouped[user]) grouped[user]={
        images:[],
        audio:null,
        note:null
      };

      if(f.format === "mp3") grouped[user].audio = f;
      else if(f.format === "txt") grouped[user].note = f;
      else grouped[user].images.push(f);
    });

    render(grouped);

  }catch(e){
    document.getElementById("projects").innerText="ERROR LOAD";
  }
}

/* RENDER */
function render(grouped){
  const container = document.getElementById("projects");
  container.innerHTML="";

  Object.keys(grouped).forEach(user=>{
    const g = grouped[user];

    const div = document.createElement("div");
    div.className="project";

    div.innerHTML=`
      <span>${user}</span>
      <div class="status">
        <span>📝 ${g.note ? "✅":"❌"}</span>
        <span>🎧 ${g.audio ? "✅":"❌"}</span>
        <span>🖼️ ${g.images.length>0 ? "✅":"❌"}</span>
      </div>
    `;

    div.onclick=()=>openProject(user,g);

    container.appendChild(div);
  });
}

/* OPEN */
function openProject(user,g){
  currentUser = user;
  title.innerText = user;

  gallery.innerHTML="";

  g.images.forEach(img=>{
    const el=document.createElement("img");
    el.src = img.secure_url;
    gallery.appendChild(el);
  });

  // audio
  if(g.audio){
    audioPlayer.src = g.audio.secure_url;
  } else {
    audioPlayer.src="";
  }

  overlay.classList.add("active");
}

/* UPLOAD AUDIO */
async function uploadAudio(){
  const file = audioInput.files[0];
  if(!file) return alert("Pilih audio");

  const name = `PROJECT_PENDING_${getRandomTime()}_BY_${currentUser.toUpperCase()}`;

  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", PRESET);
  form.append("public_id", name);

  await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,{
    method:"POST",
    body:form
  });

  alert("Audio uploaded");
  load();
}

/* UPLOAD NOTE */
async function uploadNote(){
  const text = noteInput.value;
  if(!text) return;

  const name = `PROJECT_PENDING_${getRandomTime()}_BY_${currentUser.toUpperCase()}`;

  const form = new FormData();
  form.append("file", new Blob([text],{type:"text/plain"}));
  form.append("upload_preset", PRESET);
  form.append("public_id", name);

  await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/raw/upload`,{
    method:"POST",
    body:form
  });

  alert("Note uploaded");
  load();
}

/* CLOSE */
function closeOverlay(){
  overlay.classList.remove("active");
}

load();
</script>

</body>
</html>
