<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Project</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0b0b;
  color:#fff;
}

/* HEADER */
.header {
  padding:15px;
  background:#111;
  display:flex;
  gap:10px;
}

.header input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:#fff;
}

/* GRID */
.grid {
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

/* CARD */
.card {
  background:#151515;
  border-radius:16px;
  padding:15px;
  cursor:pointer;
  transition:.2s;
}

.card:hover {
  transform:scale(1.03);
}

.status {
  margin-top:10px;
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}

.status span {
  font-size:11px;
  background:#222;
  padding:4px 6px;
  border-radius:6px;
}

/* OVERLAY */
.overlay {
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
}

.overlay.active { display:flex; }

.topbar {
  padding:15px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  padding:10px;
  overflow:auto;
}

img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

textarea, input, button {
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  border:none;
}

textarea, input {
  background:#1a1a1a;
  color:#fff;
}

button {
  background:#fff;
  color:#000;
  font-weight:600;
}

audio {
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <input type="text" id="search" placeholder="Search user..." oninput="render()">
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="topbar">
    <span id="title"></span>
    <button onclick="closeOverlay()">Close</button>
  </div>

  <div style="padding:10px">
    <textarea id="noteInput"></textarea>
    <button onclick="uploadNote()">Save Note</button>
    <div id="noteView"></div>
  </div>

  <div style="padding:10px">
    <input type="file" id="audioInput">
    <audio id="audioPlayer" controls></audio>
    <button onclick="uploadAudio()">Upload Audio</button>
  </div>

  <div style="padding:10px">
    <input type="file" id="imageInput">
    <button onclick="uploadImage()">Upload Image</button>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<script>
let allData = [];
let grouped = {};
let visibleUsers = [];
let currentUser = "";
let page = 0;
const limit = 10;

// ================= FETCH =================
async function loadData() {
  const res = await fetch("/api/backend");
  const data = await res.json();

  allData = data;

  grouped = {};

  data.forEach(item => {
    const user = item.user;

    if (!grouped[user]) {
      grouped[user] = {
        images: [],
        audio: null,
        note: null
      };
    }

    if (item.type === "image") grouped[user].images.push(item);
    if (item.type === "audio") grouped[user].audio = item;
    if (item.type === "note") grouped[user].note = item;
  });

  visibleUsers = Object.keys(grouped);
  render(true);
}

// ================= RENDER =================
function render(reset=false) {
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();

  if (reset) {
    grid.innerHTML = "";
    page = 0;
  }

  const filtered = visibleUsers.filter(u => u.includes(search));

  const slice = filtered.slice(page * limit, (page+1)*limit);

  slice.forEach(user => {
    const p = grouped[user];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${user}</strong>
      <div class="status">
        <span>📝 ${p.note ? "✅":"❌"}</span>
        <span>🎧 ${p.audio ? "✅":"❌"}</span>
        <span>🖼️ ${p.images.length ? "✅":"❌"}</span>
      </div>
    `;

    div.onclick = () => openProject(user, p);
    grid.appendChild(div);
  });
}

// ================= SCROLL =================
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 50) {
    page++;
    render();
  }
});

// ================= OPEN =================
function openProject(user, data) {
  currentUser = user;

  title.innerText = user;
  gallery.innerHTML = "";

  data.images.forEach(img => {
    const el = document.createElement("img");
    el.src = img.url;
    gallery.appendChild(el);
  });

  noteView.innerText = data.note?.text || "";

  if (data.audio) {
    audioPlayer.src = data.audio.url;
  }

  overlay.classList.add("active");
}

// ================= NOTE =================
async function uploadNote() {
  const text = noteInput.value;

  await fetch("/api/backend", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      type:"note",
      user: currentUser,
      text
    })
  });

  loadData();
}

// ================= AUDIO =================
async function uploadAudio() {
  const file = audioInput.files[0];
  if (!file) return;

  audioPlayer.src = URL.createObjectURL(file);

  const fd = new FormData();
  fd.append("type","audio");
  fd.append("user",currentUser);
  fd.append("file",file);

  const res = await fetch("/api/backend", {
    method:"POST",
    body:fd
  });

  const data = await res.json();
  audioPlayer.src = data.url;

  loadData();
}

// ================= IMAGE =================
async function uploadImage() {
  const file = imageInput.files[0];
  if (!file) return;

  const fd = new FormData();
  fd.append("type","image");
  fd.append("user",currentUser);
  fd.append("file",file);

  await fetch("/api/backend", {
    method:"POST",
    body:fd
  });

  loadData();
}

// ================= CLOSE =================
function closeOverlay() {
  overlay.classList.remove("active");
}

// init
loadData();
</script>

</body>
</html>
